<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz FODS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0a1a0f; --glass:rgba(20,60,30,0.45); --glass-border:rgba(80,180,90,0.18);
    --glass-hover:rgba(30,80,40,0.6); --green-deep:#1a4a25; --green-mid:#2d7a3a;
    --green-bright:#4caf60; --green-glow:#6fcf7f; --green-light:#a8e6b0;
    --text:#e8f5ea; --text-muted:#8db899; --text-dim:#567a5e;
    --correct:#4caf50; --incorrect:#e57373;
    --sel-bg:rgba(90,100,110,0.5); --sel-border:rgba(150,160,170,0.45);
    --radius:16px; --radius-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);background-image:radial-gradient(ellipse at 20% 20%,rgba(30,100,40,.25) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(15,60,25,.3) 0%,transparent 60%);min-height:100vh;font-family:'Inter',sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;}
  header{width:100%;padding:20px 40px;display:flex;align-items:center;gap:14px;background:rgba(10,26,15,.7);backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border);position:sticky;top:0;z-index:100;}
  .logo{width:34px;height:34px;background:linear-gradient(135deg,var(--green-mid),var(--green-bright));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
  header h1{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;color:var(--green-light);letter-spacing:-.3px;}
  .header-sub{margin-left:auto;font-size:13px;color:var(--text-muted);}
  main{width:100%;max-width:780px;padding:36px 20px 80px;display:flex;flex-direction:column;gap:22px;}
  .glass{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}

  /* FILE SELECT */
  #screen-select{display:flex;flex-direction:column;gap:20px;}
  .screen-title{font-family:'Space Grotesk',sans-serif;font-size:27px;font-weight:700;color:var(--green-light);text-align:center;margin-top:8px;}
  .screen-sub{text-align:center;color:var(--text-muted);font-size:14px;margin-top:-10px;}
  #file-list{display:flex;flex-direction:column;gap:8px;}
  .file-item{display:flex;align-items:center;gap:14px;padding:15px 20px;cursor:pointer;border-radius:var(--radius-sm);border:1px solid var(--glass-border);background:rgba(20,55,28,.35);transition:all .2s;}
  .file-item:hover{background:var(--glass-hover);border-color:rgba(80,180,90,.4);transform:translateX(4px);}
  .file-icon{width:34px;height:34px;background:linear-gradient(135deg,rgba(45,122,58,.5),rgba(76,175,96,.3));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .file-name{font-size:15px;font-weight:500;}
  .file-arrow{margin-left:auto;color:var(--text-dim);font-size:18px;}
  .loading-msg{text-align:center;color:var(--text-muted);padding:40px;font-size:14px;}
  .error-msg{text-align:center;color:var(--incorrect);padding:28px;font-size:14px;background:rgba(229,115,115,.08);border:1px solid rgba(229,115,115,.2);border-radius:var(--radius-sm);}

  /* COUNT PICKER */
  #screen-count{display:none;flex-direction:column;gap:20px;align-items:center;padding:36px 28px;text-align:center;}
  .count-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--green-light);}
  .count-sub{font-size:14px;color:var(--text-muted);margin-top:-10px;}
  .count-input{width:130px;padding:12px 16px;background:rgba(10,30,15,.7);border:1px solid var(--glass-border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:24px;font-weight:700;text-align:center;transition:border-color .2s;}
  .count-input:focus{outline:none;border-color:var(--green-mid);}
  .count-hint{font-size:13px;color:var(--text-dim);}

  /* QUIZ */
  #screen-quiz{display:none;flex-direction:column;gap:22px;}
  .quiz-header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .btn-back{background:rgba(20,55,28,.5);border:1px solid var(--glass-border);color:var(--text-muted);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s;font-family:inherit;}
  .btn-back:hover{background:rgba(30,80,40,.7);color:var(--text);}
  .quiz-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;color:var(--green-light);}
  .progress-wrap{display:flex;align-items:center;gap:14px;padding:14px 20px;}
  .progress-bar-bg{flex:1;height:6px;background:rgba(80,180,90,.15);border-radius:3px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--green-mid),var(--green-bright));border-radius:3px;transition:width .4s ease;}
  .progress-label{font-size:13px;color:var(--text-muted);white-space:nowrap;}
  .question-card{padding:26px;display:flex;flex-direction:column;gap:18px;}
  .q-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;width:fit-content;}
  .q-badge.single{background:rgba(76,175,96,.15);color:var(--green-glow);border:1px solid rgba(76,175,96,.3);}
  .q-badge.multi{background:rgba(129,199,132,.12);color:#a5d6a7;border:1px solid rgba(129,199,132,.25);}
  .q-badge.open{background:rgba(255,193,7,.1);color:#ffd54f;border:1px solid rgba(255,193,7,.2);}
  .q-badge.tf{background:rgba(100,150,255,.12);color:#90caf9;border:1px solid rgba(100,150,255,.25);}
  .q-text{font-size:17px;font-weight:500;line-height:1.55;}
  .q-image{max-width:100%;max-height:320px;border-radius:var(--radius-sm);border:1px solid var(--glass-border);object-fit:contain;background:rgba(0,0,0,.2);}

  /* CHOICE */
  .answers{display:flex;flex-direction:column;gap:9px;}
  .answer-btn{display:flex;align-items:center;gap:14px;padding:13px 18px;border-radius:var(--radius-sm);border:1px solid var(--glass-border);background:rgba(15,45,22,.5);cursor:pointer;text-align:left;color:var(--text);font-size:15px;font-family:inherit;transition:all .18s;line-height:1.4;}
  .answer-btn:hover:not(:disabled){background:rgba(55,65,75,.45);border-color:rgba(130,140,150,.4);}
  .answer-btn.selected{background:var(--sel-bg);border-color:var(--sel-border);color:#d8dde3;}
  .answer-btn.selected .answer-letter{background:rgba(130,140,150,.3);border-color:rgba(150,160,170,.5);color:#b8c0c8;}
  .answer-btn.correct{background:rgba(76,175,80,.2);border-color:var(--correct);color:#a5d6a7;}
  .answer-btn.incorrect{background:rgba(229,115,115,.15);border-color:var(--incorrect);color:#ef9a9a;}
  .answer-btn:disabled{cursor:default;}
  .answer-letter{width:28px;height:28px;border-radius:6px;background:rgba(80,180,90,.12);border:1px solid rgba(80,180,90,.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--green-glow);flex-shrink:0;}
  .answer-btn.correct .answer-letter{background:rgba(76,175,80,.3);border-color:var(--correct);color:var(--correct);}
  .answer-btn.incorrect .answer-letter{background:rgba(229,115,115,.2);border-color:var(--incorrect);color:var(--incorrect);}

  /* TRUE/FALSE */
  .tf-list{display:flex;flex-direction:column;gap:10px;}
  .tf-row{display:flex;align-items:center;gap:14px;padding:13px 18px;border-radius:var(--radius-sm);border:1px solid var(--glass-border);background:rgba(15,45,22,.4);transition:all .2s;}
  .tf-text{flex:1;font-size:15px;line-height:1.4;}
  .tf-btns{display:flex;gap:8px;flex-shrink:0;align-items:center;}
  .tf-btn{padding:6px 16px;border-radius:7px;border:1px solid;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s;}
  .tf-btn.t-btn{background:rgba(76,175,80,.1);border-color:rgba(76,175,80,.3);color:#81c784;}
  .tf-btn.t-btn:hover:not(:disabled){background:rgba(76,175,80,.25);border-color:rgba(76,175,80,.55);}
  .tf-btn.t-btn.selected{background:rgba(90,100,110,.45);border-color:rgba(150,160,170,.5);color:#c8cdd2;}
  .tf-btn.f-btn{background:rgba(229,115,115,.1);border-color:rgba(229,115,115,.3);color:#e57373;}
  .tf-btn.f-btn:hover:not(:disabled){background:rgba(229,115,115,.25);border-color:rgba(229,115,115,.55);}
  .tf-btn.f-btn.selected{background:rgba(90,100,110,.45);border-color:rgba(150,160,170,.5);color:#c8cdd2;}
  .tf-btn:disabled{cursor:default;}
  .tf-row.tf-correct{border-color:var(--correct);background:rgba(76,175,80,.1);}
  .tf-row.tf-incorrect{border-color:var(--incorrect);background:rgba(229,115,115,.08);}
  .tf-hint{font-size:12px;color:var(--text-muted);margin-left:4px;}

  /* SUMMARY */
  #screen-summary{display:none;flex-direction:column;gap:16px;width:100%;}
  .summary-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--green-light);padding:22px 24px 0;}
  .summary-list{display:flex;flex-direction:column;gap:10px;padding:12px 16px 20px;}
  .sum-item{border-radius:var(--radius-sm);border:1px solid var(--glass-border);background:rgba(15,45,22,.45);overflow:hidden;}
  .sum-item.sum-correct{border-color:rgba(76,175,80,.4);}
  .sum-item.sum-incorrect{border-color:rgba(229,115,115,.4);}
  .sum-item.sum-open-ok{border-color:rgba(76,175,80,.35);}
  .sum-item.sum-open-no{border-color:rgba(229,115,115,.35);}
  .sum-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;}
  .sum-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
  .sum-icon.ok{background:rgba(76,175,80,.25);color:var(--correct);}
  .sum-icon.no{background:rgba(229,115,115,.2);color:var(--incorrect);}
  .sum-icon.open-ok{background:rgba(76,175,80,.2);color:var(--correct);}
  .sum-icon.open-no{background:rgba(229,115,115,.18);color:var(--incorrect);}
  .sum-qnum{font-size:12px;color:var(--text-dim);flex-shrink:0;}
  .sum-qtext{font-size:14px;font-weight:500;flex:1;line-height:1.35;}
  .sum-arrow{font-size:13px;color:var(--text-dim);transition:transform .2s;flex-shrink:0;}
  .sum-item.open-detail .sum-arrow{transform:rotate(90deg);}
  .sum-detail{display:none;padding:0 16px 14px;border-top:1px solid rgba(255,255,255,.05);}
  .sum-item.open-detail .sum-detail{display:block;}
  .sum-detail-row{display:flex;gap:8px;align-items:baseline;margin-top:8px;font-size:13px;line-height:1.4;}
  .sum-detail-label{color:var(--text-dim);white-space:nowrap;flex-shrink:0;}
  .sum-detail-val{color:var(--text-muted);}
  .sum-detail-val.good{color:#81c784;}
  .sum-detail-val.bad{color:#e57373;}
  .sum-tf-row{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:13px;}
  .sum-tf-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;}
  .sum-tf-badge.ok{background:rgba(76,175,80,.2);color:#81c784;}
  .sum-tf-badge.no{background:rgba(229,115,115,.18);color:#e57373;}

  /* OPEN */
  .open-textarea{width:100%;min-height:96px;padding:13px 16px;background:rgba(10,30,15,.6);border:1px solid var(--glass-border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:15px;resize:vertical;transition:border-color .2s;line-height:1.5;}
  .open-textarea:focus{outline:none;border-color:var(--green-mid);}
  .open-textarea:disabled{opacity:.7;cursor:default;}

  /* FEEDBACK */
  .feedback-box{padding:13px 18px;border-radius:var(--radius-sm);font-size:14px;line-height:1.5;display:none;}
  .feedback-box.correct-fb{background:rgba(76,175,80,.12);border:1px solid rgba(76,175,80,.3);color:#a5d6a7;}
  .feedback-box.incorrect-fb{background:rgba(229,115,115,.1);border:1px solid rgba(229,115,115,.25);color:#ef9a9a;}

  /* SELF ASSESS */
  .self-assess{display:none;flex-direction:column;gap:10px;padding:15px;background:rgba(255,193,7,.06);border:1px solid rgba(255,193,7,.2);border-radius:var(--radius-sm);}
  .self-assess p{font-size:14px;color:#ffd54f;}
  .self-btns{display:flex;gap:10px;}
  .btn-self{flex:1;padding:10px;border-radius:8px;border:1px solid;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s;}
  .btn-self.yes{background:rgba(76,175,80,.15);border-color:rgba(76,175,80,.4);color:#a5d6a7;}
  .btn-self.yes:hover{background:rgba(76,175,80,.3);}
  .btn-self.yes.selected{background:rgba(90,100,110,.45);border-color:rgba(150,160,170,.5);color:#c8cdd2;}
  .btn-self.no{background:rgba(229,115,115,.12);border-color:rgba(229,115,115,.35);color:#ef9a9a;}
  .btn-self.no:hover{background:rgba(229,115,115,.25);}
  .btn-self.no.selected{background:rgba(90,100,110,.45);border-color:rgba(150,160,170,.5);color:#c8cdd2;}

  /* ACTIONS */
  .q-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .btn-primary{padding:12px 28px;background:linear-gradient(135deg,var(--green-deep),var(--green-mid));border:1px solid rgba(80,180,90,.4);border-radius:10px;color:var(--green-light);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
  .btn-primary:hover:not(:disabled){background:linear-gradient(135deg,var(--green-mid),var(--green-bright));color:#fff;transform:translateY(-1px);box-shadow:0 4px 20px rgba(76,175,96,.25);}
  .btn-primary:disabled{opacity:.4;cursor:default;transform:none;}
  .btn-secondary{padding:12px 22px;background:transparent;border:1px solid var(--glass-border);border-radius:10px;color:var(--text-muted);font-size:14px;cursor:pointer;font-family:inherit;transition:all .2s;}
  .btn-secondary:hover{background:rgba(30,80,40,.4);color:var(--text);}

  /* RESULT */
  #screen-result{display:none;flex-direction:column;gap:22px;align-items:center;text-align:center;padding:38px 28px;}
  .result-emoji{font-size:60px;}
  .result-score{font-family:'Space Grotesk',sans-serif;font-size:54px;font-weight:700;color:var(--green-bright);letter-spacing:-2px;line-height:1;}
  .result-label{font-size:14px;color:var(--text-muted);margin-top:-8px;}
  .result-breakdown{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  .rb-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 18px;background:rgba(20,55,28,.5);border:1px solid var(--glass-border);border-radius:var(--radius-sm);min-width:86px;}
  .rb-num{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;}
  .rb-label{font-size:12px;color:var(--text-muted);}
  .rb-num.green{color:var(--correct);} .rb-num.red{color:var(--incorrect);} .rb-num.yellow{color:#ffd54f;}
  ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:rgba(80,180,90,.2);border-radius:3px;}
  @media(max-width:600px){header{padding:14px 18px;}main{padding:20px 12px 60px;}.question-card{padding:18px;}.tf-row{flex-direction:column;align-items:flex-start;gap:10px;}}
</style>
</head>
<body>
<header>
  <div class="logo">&#x1F9EA;</div>
  <h1>Quiz FODS</h1>
  <span class="header-sub" id="header-info"></span>
</header>
<main>
  <!-- FILE SELECT -->
  <div id="screen-select">
    <div class="screen-title">Wybierz zestaw pytan</div>
    <p class="screen-sub">Pliki z repozytorium GitHub</p>
    <div class="glass" style="padding:8px;">
      <div id="file-list"><div class="loading-msg">&#x23F3; Ladowanie listy plikow...</div></div>
    </div>
  </div>
  <!-- COUNT PICKER -->
  <div class="glass" id="screen-count">
    <div class="count-title">Ile pytan?</div>
    <p class="count-sub">Baza zawiera <strong id="total-count">0</strong> pytan</p>
    <input type="number" class="count-input" id="count-input" min="1" value="10">
    <p class="count-hint">Pytania zostana losowo wybrane z bazy</p>
    <div class="q-actions" style="justify-content:center;">
      <button class="btn-secondary" onclick="goBack()">&#x2190; Powrot</button>
      <button class="btn-primary" onclick="startQuizWithCount()">Rozpocznij &#x2192;</button>
    </div>
  </div>
  <!-- QUIZ -->
  <div id="screen-quiz">
    <div class="quiz-header">
      <button class="btn-back" onclick="goBack()">&#x2190; Powrot</button>
      <span class="quiz-title" id="quiz-filename"></span>
    </div>
    <div class="glass progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="progress-label" id="progress-label">0 / 0</span>
    </div>
    <div class="glass question-card" id="question-card"></div>
  </div>
  <!-- RESULT -->
  <div class="glass" id="screen-result">
    <div class="result-emoji" id="result-emoji">&#x1F389;</div>
    <div class="result-score" id="result-score">0%</div>
    <div class="result-label">wynik koncowy</div>
    <div class="result-breakdown">
      <div class="rb-item"><span class="rb-num green" id="rb-correct">0</span><span class="rb-label">Poprawne</span></div>
      <div class="rb-item"><span class="rb-num red" id="rb-incorrect">0</span><span class="rb-label">Bledne</span></div>
      <div class="rb-item"><span class="rb-num yellow" id="rb-open">0</span><span class="rb-label">Otwarte</span></div>
    </div>
    <div class="q-actions" style="justify-content:center;margin-top:6px;">
      <button class="btn-primary" onclick="restartQuiz()">Powtorz quiz</button>
      <button class="btn-secondary" onclick="showSummary()">&#x1F4CB; Szczegoly</button>
      <button class="btn-secondary" onclick="goBack()">Inny zestaw</button>
    </div>
  </div>
  <!-- SUMMARY -->
  <div id="screen-summary">
    <div class="glass" style="width:100%">
      <div class="summary-title">&#x1F4CB; Szczegolowe podsumowanie</div>
      <div class="summary-list" id="summary-list"></div>
    </div>
    <div class="q-actions" style="justify-content:center;">
      <button class="btn-primary" onclick="restartQuiz()">Powtorz quiz</button>
      <button class="btn-secondary" onclick="goBack()">Inny zestaw</button>
    </div>
  </div>
</main>
<script>
const GITHUB_USER='koleksiak',GITHUB_REPO='koleksiak.github.io',GITHUB_FOLDER='FODS';
const RAW_BASE=`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${GITHUB_FOLDER}/`;
const API_URL=`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FOLDER}`;
let allQuestions=[],questions=[],current=0,score={correct:0,incorrect:0,open:0},answered=false,currentFile='',tfAnswers={},history=[];
window.addEventListener('DOMContentLoaded',loadFileList);
async function loadFileList(){
  const list=document.getElementById('file-list');
  try{
    const res=await fetch(API_URL);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const files=await res.json();
    const txts=files.filter(f=>f.name.endsWith('.txt'));
    if(!txts.length){list.innerHTML='<div class="error-msg">Brak plikow .txt w folderze FODS.</div>';return;}
    list.innerHTML='';
    txts.forEach(file=>{
      const item=document.createElement('div');item.className='file-item';
      item.innerHTML=`<div class="file-icon">&#x1F4C4;</div><span class="file-name">${file.name.replace('.txt','')}</span><span class="file-arrow">&#x203A;</span>`;
      item.onclick=()=>loadFile(file.name,file.download_url);
      list.appendChild(item);
    });
  }catch(e){list.innerHTML=`<div class="error-msg">&#x274C; Nie udalo sie pobrac listy plikow.<br><small>${e.message}</small></div>`;}
}
function parseQuizFile(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#')&&!l.startsWith('//'));
  const qs=[];
  for(const line of lines){
    const parts=line.split('|');if(parts.length<2)continue;
    const raw=parts[0].trim();let questionText=raw,imageName=null;
    const imgM=raw.match(/\[img:([^\]]+)\]/i);
    if(imgM){imageName=imgM[1].trim();questionText=raw.replace(imgM[0],'').trim();}
    const last=parts[parts.length-1].trim();
    // TRUE/FALSE: last segment is T/F combinations like "T,F,T"
    if(/^[TF](,[TF])*$/i.test(last)&&parts.length>=3){
      const answers=last.toUpperCase().split(',').map(x=>x.trim());
      const statements=parts.slice(1,parts.length-1).map(s=>s.trim());
      if(statements.length===answers.length){qs.push({type:'tf',text:questionText,statements,answers,image:imageName});continue;}
    }
    // CHOICE: last segment is letter(s)
    if(/^[A-Z](,[A-Z])*$/i.test(last)){
      const correct=last.toUpperCase().split(',').map(l=>l.trim());
      const options=parts.slice(1,parts.length-1).map(o=>o.trim());
      if(options.length){qs.push({type:correct.length>1?'multi':'single',text:questionText,options,correct,image:imageName});continue;}
    }
    // OPEN
    qs.push({type:'open',text:questionText,answer:parts.slice(1).join('|').trim(),image:imageName});
  }
  return qs;
}
async function loadFile(filename,url){
  try{
    const res=await fetch(url);const text=await res.text();
    allQuestions=parseQuizFile(text);
    if(!allQuestions.length){alert('Plik jest pusty lub ma nieprawidlowy format.');return;}
    currentFile=filename;
    document.getElementById('total-count').textContent=allQuestions.length;
    const inp=document.getElementById('count-input');
    inp.max=allQuestions.length;inp.value=Math.min(10,allQuestions.length);
    showScreen('screen-count');
  }catch(e){alert('Blad wczytywania pliku: '+e.message);}
}
function startQuizWithCount(){
  let n=parseInt(document.getElementById('count-input').value,10);
  if(isNaN(n)||n<1)n=1;if(n>allQuestions.length)n=allQuestions.length;
  const shuffled=[...allQuestions].sort(()=>Math.random()-.5);
  questions=shuffled.slice(0,n);
  current=0;score={correct:0,incorrect:0,open:0};answered=false;history=[];
  document.getElementById('quiz-filename').textContent=currentFile.replace('.txt','');
  document.getElementById('header-info').textContent=questions.length+' pytan';
  showScreen('screen-quiz');renderQuestion();
}
function showScreen(id){
  ['screen-select','screen-count','screen-quiz','screen-result','screen-summary'].forEach(s=>{
    document.getElementById(s).style.display=(s===id)?'flex':'none';
  });
}
function renderQuestion(){
  const q=questions[current];answered=false;tfAnswers={};
  const pct=Math.round((current/questions.length)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-label').textContent=(current+1)+' / '+questions.length;
  const card=document.getElementById('question-card');card.innerHTML='';
  const labels={single:'Jednokrotny wybor',multi:'Wielokrotny wybor',open:'Otwarte',tf:'Prawda / Falsz'};
  const badge=document.createElement('span');badge.className='q-badge '+q.type;badge.textContent='\u25aa '+labels[q.type];card.appendChild(badge);
  const qtext=document.createElement('div');qtext.className='q-text';qtext.textContent=q.text;card.appendChild(qtext);
  if(q.image){const img=document.createElement('img');img.className='q-image';img.src=RAW_BASE+q.image;img.alt='Ilustracja';img.onerror=()=>img.style.display='none';card.appendChild(img);}
  const feedback=document.createElement('div');feedback.className='feedback-box';feedback.id='feedback-box';
  if(q.type==='single'||q.type==='multi')renderChoice(card,q);
  else if(q.type==='tf')renderTF(card,q);
  else renderOpen(card,q);
  card.appendChild(feedback);
  const actions=document.createElement('div');actions.className='q-actions';actions.id='q-actions';
  const checkBtn=document.createElement('button');checkBtn.className='btn-primary';checkBtn.id='check-btn';
  checkBtn.textContent=q.type==='open'?'Sprawdz / Pokaz odpowiedz':'Sprawdz';
  checkBtn.onclick=q.type==='open'?checkOpen:(q.type==='tf'?checkTF:checkChoice);
  actions.appendChild(checkBtn);
  const nextBtn=document.createElement('button');nextBtn.className='btn-secondary';nextBtn.id='next-btn';
  nextBtn.textContent=current<questions.length-1?'Nastepne \u2192':'Zakoncz quiz';
  nextBtn.style.display='none';nextBtn.onclick=nextQuestion;actions.appendChild(nextBtn);
  card.appendChild(actions);
}
function renderChoice(card,q){
  const wrap=document.createElement('div');wrap.className='answers';wrap.id='answers-wrap';
  const L='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');btn.className='answer-btn';btn.dataset.letter=L[i];
    btn.innerHTML=`<span class="answer-letter">${L[i]}</span><span>${opt}</span>`;
    btn.onclick=()=>{
      if(answered)return;
      if(q.type==='single'){document.querySelectorAll('.answer-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');}
      else btn.classList.toggle('selected');
    };
    wrap.appendChild(btn);
  });
  card.appendChild(wrap);
}
function renderTF(card,q){
  const list=document.createElement('div');list.className='tf-list';list.id='tf-list';
  q.statements.forEach((stmt,i)=>{
    const row=document.createElement('div');row.className='tf-row';row.dataset.idx=i;
    const txt=document.createElement('span');txt.className='tf-text';txt.textContent=stmt;
    const btns=document.createElement('div');btns.className='tf-btns';
    const tBtn=document.createElement('button');tBtn.className='tf-btn t-btn';tBtn.textContent='T';
    const fBtn=document.createElement('button');fBtn.className='tf-btn f-btn';fBtn.textContent='F';
    tBtn.onclick=()=>{if(answered)return;tfAnswers[i]='T';tBtn.classList.add('selected');fBtn.classList.remove('selected');};
    fBtn.onclick=()=>{if(answered)return;tfAnswers[i]='F';fBtn.classList.add('selected');tBtn.classList.remove('selected');};
    btns.appendChild(tBtn);btns.appendChild(fBtn);
    row.appendChild(txt);row.appendChild(btns);list.appendChild(row);
  });
  card.appendChild(list);
}
function renderOpen(card,q){
  const ta=document.createElement('textarea');ta.className='open-textarea';ta.id='open-input';ta.placeholder='Wpisz swoja odpowiedz...';card.appendChild(ta);
  const self=document.createElement('div');self.className='self-assess';self.id='self-assess';
  self.innerHTML='<p>Czy Twoja odpowiedz byla poprawna?</p><div class="self-btns"><button class="btn-self yes" id="self-yes">\u2713 Tak</button><button class="btn-self no" id="self-no">\u2717 Nie</button></div>';
  card.appendChild(self);
}
function checkChoice(){
  if(answered)return;const q=questions[current];
  const selected=[...document.querySelectorAll('.answer-btn.selected')].map(b=>b.dataset.letter);
  if(!selected.length){alert('Wybierz odpowiedz!');return;}
  answered=true;document.querySelectorAll('.answer-btn').forEach(b=>b.disabled=true);
  const ok=selected.length===q.correct.length&&q.correct.every(l=>selected.includes(l));
  document.querySelectorAll('.answer-btn').forEach(b=>{
    const l=b.dataset.letter;
    if(q.correct.includes(l))b.classList.add('correct');
    else if(selected.includes(l))b.classList.add('incorrect');
  });
  showFeedback(ok,ok?'\u2713 Poprawnie!':'\u2717 Bledna odpowiedz. Poprawne: '+q.correct.join(', '));
  if(ok)score.correct++;else score.incorrect++;
  history.push({q,type:q.type,ok,selected,userAnswer:null,tfAnswers:null});
  finishCheck();
}
function checkTF(){
  if(answered)return;const q=questions[current];
  for(let i=0;i<q.statements.length;i++){if(tfAnswers[i]===undefined){alert('Zaznacz T lub F dla kazdego stwierdzenia!');return;}}
  answered=true;let allOk=true;
  document.querySelectorAll('.tf-list .tf-row').forEach((row,i)=>{
    const ok=tfAnswers[i]===q.answers[i];if(!ok)allOk=false;
    row.classList.add(ok?'tf-correct':'tf-incorrect');
    row.querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
    if(!ok){const h=document.createElement('span');h.className='tf-hint';h.textContent='(poprawne: '+q.answers[i]+')';row.querySelector('.tf-btns').appendChild(h);}
  });
  showFeedback(allOk,allOk?'\u2713 Wszystkie odpowiedzi poprawne!':'\u2717 Niektorze odpowiedzi byly bledne.');
  if(allOk)score.correct++;else score.incorrect++;
  history.push({q,type:'tf',ok:allOk,selected:null,userAnswer:null,tfAnswers:{...tfAnswers}});
  finishCheck();
}
function checkOpen(){
  if(answered)return;const q=questions[current];
  document.getElementById('open-input').disabled=true;answered=true;
  const fb=document.getElementById('feedback-box');
  fb.className='feedback-box correct-fb';fb.style.display='block';
  fb.innerHTML=q.answer?'<strong>Wzorcowa odpowiedz:</strong><br>'+q.answer:'Odpowiedz otwarta - ocen samodzielnie.';
  const self=document.getElementById('self-assess');self.style.display='flex';
  document.getElementById('check-btn').style.display='none';
  let selfChoice=null;
  const yesBtn=document.getElementById('self-yes');
  const noBtn=document.getElementById('self-no');
  const nextBtn=document.getElementById('next-btn');
  function selectSelf(ok){
    selfChoice=ok;
    yesBtn.classList.toggle('selected',ok===true);
    noBtn.classList.toggle('selected',ok===false);
    nextBtn.style.display='';
  }
  yesBtn.onclick=()=>selectSelf(true);
  noBtn.onclick=()=>selectSelf(false);
  nextBtn.onclick=()=>{
    if(selfChoice===null){renderQuestion();return;}
    selfAssess(selfChoice);
  };
}
function selfAssess(ok){
  const q=questions[current];
  if(ok)score.correct++;else score.incorrect++;score.open++;
  history.push({q,type:'open',ok,selected:null,userAnswer:document.getElementById('open-input').value,tfAnswers:null});
  nextQuestion();
}
function showFeedback(ok,msg){
  const fb=document.getElementById('feedback-box');
  fb.className='feedback-box '+(ok?'correct-fb':'incorrect-fb');
  fb.textContent=msg;fb.style.display='block';
}
function finishCheck(){document.getElementById('check-btn').style.display='none';document.getElementById('next-btn').style.display='';}
function nextQuestion(){current++;if(current>=questions.length)showResult();else renderQuestion();}
function showResult(){
  showScreen('screen-result');
  const pct=Math.round((score.correct/questions.length)*100);
  document.getElementById('result-score').textContent=pct+'%';
  document.getElementById('rb-correct').textContent=score.correct;
  document.getElementById('rb-incorrect').textContent=score.incorrect;
  document.getElementById('rb-open').textContent=score.open;
  document.getElementById('result-emoji').textContent=pct>=90?'\uD83C\uDFC6':pct>=70?'\uD83C\uDF89':pct>=50?'\uD83D\uDCDA':'\uD83D\uDCAA';
  document.getElementById('header-info').textContent='';
  renderSummary();
}
function renderSummary(){
  const L='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const list=document.getElementById('summary-list');list.innerHTML='';
  history.forEach((h,idx)=>{
    const q=h.q;
    const item=document.createElement('div');
    let cls='sum-item ';
    if(h.type==='open')cls+=h.ok?'sum-open-ok':'sum-open-no';
    else cls+=h.ok?'sum-correct':'sum-incorrect';
    item.className=cls;
    const iconCls=h.type==='open'?(h.ok?'open-ok':'open-no'):(h.ok?'ok':'no');
    const icon=h.ok?'\u2713':'\u2717';
    const hdr=document.createElement('div');hdr.className='sum-header';
    hdr.innerHTML=`<span class="sum-icon ${iconCls}">${icon}</span><span class="sum-qnum">${idx+1}.</span><span class="sum-qtext">${q.text}</span><span class="sum-arrow">&#x203A;</span>`;
    hdr.onclick=()=>{item.classList.toggle('open-detail');};
    item.appendChild(hdr);
    const detail=document.createElement('div');detail.className='sum-detail';
    if(h.type==='single'||h.type==='multi'){
      const corrLabels=q.correct.map(l=>l+': '+q.options[L.indexOf(l)]).join(', ');
      const selLabels=h.selected.length?h.selected.map(l=>l+': '+q.options[L.indexOf(l)]).join(', '):'(brak)';
      detail.innerHTML=`<div class="sum-detail-row"><span class="sum-detail-label">Twoja odp.:</span><span class="sum-detail-val ${h.ok?'good':'bad'}">${selLabels}</span></div><div class="sum-detail-row"><span class="sum-detail-label">Poprawna:</span><span class="sum-detail-val good">${corrLabels}</span></div>`;
    } else if(h.type==='tf'){
      let rows='';
      q.statements.forEach((stmt,i)=>{
        const ua=h.tfAnswers[i]||'?';const ca=q.answers[i];const ok=ua===ca;
        rows+=`<div class="sum-tf-row"><span class="sum-tf-badge ${ok?'ok':'no'}">${ok?'\u2713':'\u2717'}</span><span style="flex:1;font-size:13px;color:var(--text-muted)">${stmt}</span><span style="font-size:12px;color:var(--text-dim);margin-left:6px">Ty: ${ua} / Popr: ${ca}</span></div>`;
      });
      detail.innerHTML=rows;
    } else {
      const ua=h.userAnswer||'(brak odpowiedzi)';
      const ans=q.answer||'(brak wzorcowej odpowiedzi)';
      detail.innerHTML=`<div class="sum-detail-row"><span class="sum-detail-label">Twoja odp.:</span><span class="sum-detail-val" style="white-space:pre-wrap">${ua}</span></div><div class="sum-detail-row"><span class="sum-detail-label">Wzorcowa:</span><span class="sum-detail-val good">${ans}</span></div>`;
    }
    item.appendChild(detail);list.appendChild(item);
  });
}
function showSummary(){showScreen('screen-summary');}
function restartQuiz(){
  current=0;score={correct:0,incorrect:0,open:0};answered=false;history=[];
  const shuffled=[...allQuestions].sort(()=>Math.random()-.5);
  questions=shuffled.slice(0,questions.length);
  document.getElementById('header-info').textContent=questions.length+' pytan';
  showScreen('screen-quiz');renderQuestion();
}
function goBack(){document.getElementById('header-info').textContent='';showScreen('screen-select');}
</script>
